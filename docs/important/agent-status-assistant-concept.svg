<svg width="1440" height="980" viewBox="0 0 1440 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="260" y1="80" x2="1180" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#171A21"/>
      <stop offset="1" stop-color="#0F1218"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1120" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="rgba(255,255,255,0.04)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
    <linearGradient id="thinkGlow" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7E90FF"/>
      <stop offset="1" stop-color="#4B66E8"/>
    </linearGradient>
    <linearGradient id="toolGlow" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#46D6A5"/>
      <stop offset="1" stop-color="#1F9E78"/>
    </linearGradient>
    <linearGradient id="answerGlow" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6BDB72"/>
      <stop offset="1" stop-color="#2DBE53"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <style>
      .title { font: 700 36px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #F4F7FB; }
      .subtitle { font: 400 18px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #8E97A8; }
      .label { font: 600 13px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #B4BDCC; letter-spacing: 0.6px; }
      .status { font: 600 20px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #E8EDF5; }
      .hint { font: 400 15px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #8891A2; }
      .note { font: 500 17px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #CDD5E3; }
    </style>
  </defs>

  <rect width="1440" height="980" fill="url(#bg)"/>
  <circle cx="1250" cy="150" r="220" fill="#1A2030" opacity="0.22"/>
  <circle cx="120" cy="910" r="260" fill="#101722" opacity="0.3"/>

  <text x="160" y="112" class="title">方案二 · 小助手形态图标 + 极轻动画</text>
  <text x="160" y="148" class="subtitle">静态样式图。真实实现建议只做轻微眨眼、天线闪动、下方三点流动，不做奔跑式卡通动作。</text>

  <g transform="translate(156 222)">
    <text x="0" y="0" class="label">STATE A</text>
    <rect x="0" y="26" rx="24" ry="24" width="1128" height="128" fill="#181B23" stroke="rgba(255,255,255,0.08)"/>
    <rect x="1" y="27" rx="23" ry="23" width="1126" height="126" fill="url(#panel)"/>
    <g transform="translate(34 53)">
      <circle cx="30" cy="30" r="26" fill="#7E90FF" opacity="0.14" filter="url(#shadow)"/>
      <rect x="10" y="14" width="40" height="30" rx="14" fill="#242A39" stroke="url(#thinkGlow)" stroke-width="1.8"/>
      <rect x="18" y="21" width="8" height="8" rx="4" fill="#EAF0FF"/>
      <rect x="34" y="21" width="8" height="8" rx="4" fill="#EAF0FF"/>
      <rect x="23" y="33" width="14" height="3.4" rx="1.7" fill="#C8D1E3"/>
      <path d="M30 14V8" stroke="#8C9BFF" stroke-width="2" stroke-linecap="round"/>
      <circle cx="30" cy="6" r="3" fill="#8C9BFF"/>
    </g>
    <text x="112" y="92" class="status">思考中...</text>
    <text x="112" y="122" class="hint">小助手保持安静待机，真实动效建议是轻微眨眼和头顶信号点缓慢呼吸。</text>
  </g>

  <g transform="translate(156 392)">
    <text x="0" y="0" class="label">STATE B</text>
    <rect x="0" y="26" rx="24" ry="24" width="1128" height="128" fill="#181B23" stroke="rgba(255,255,255,0.08)"/>
    <rect x="1" y="27" rx="23" ry="23" width="1126" height="126" fill="url(#panel)"/>
    <g transform="translate(34 53)">
      <circle cx="30" cy="30" r="26" fill="#45D4A4" opacity="0.14" filter="url(#shadow)"/>
      <rect x="10" y="14" width="40" height="30" rx="14" fill="#212B2A" stroke="url(#toolGlow)" stroke-width="1.8"/>
      <rect x="18" y="21" width="8" height="8" rx="4" fill="#ECFFF8"/>
      <rect x="34" y="21" width="8" height="8" rx="4" fill="#ECFFF8"/>
      <rect x="23" y="33" width="14" height="3.4" rx="1.7" fill="#D2E7DE"/>
      <path d="M30 14V8" stroke="#52D8A8" stroke-width="2" stroke-linecap="round"/>
      <circle cx="30" cy="6" r="3" fill="#52D8A8"/>
      <path d="M50 24H58" stroke="#52D8A8" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
      <path d="M52 30H62" stroke="#52D8A8" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    </g>
    <text x="112" y="92" class="status">调用工具中...</text>
    <text x="112" y="122" class="hint">这里可做极短的侧向扫光或天线闪烁，表示助手正在和工具层交互。</text>
  </g>

  <g transform="translate(156 562)">
    <text x="0" y="0" class="label">STATE C</text>
    <rect x="0" y="26" rx="24" ry="24" width="1128" height="128" fill="#181B23" stroke="rgba(255,255,255,0.08)"/>
    <rect x="1" y="27" rx="23" ry="23" width="1126" height="126" fill="url(#panel)"/>
    <g transform="translate(34 53)">
      <circle cx="30" cy="30" r="26" fill="#6ADB72" opacity="0.14" filter="url(#shadow)"/>
      <rect x="10" y="14" width="40" height="30" rx="14" fill="#222C27" stroke="url(#answerGlow)" stroke-width="1.8"/>
      <rect x="18" y="21" width="8" height="8" rx="4" fill="#F1FFF3"/>
      <rect x="34" y="21" width="8" height="8" rx="4" fill="#F1FFF3"/>
      <rect x="23" y="33" width="14" height="3.4" rx="1.7" fill="#D0E7D2"/>
      <circle cx="18" cy="52" r="2.6" fill="#74DF7B"/>
      <circle cx="30" cy="52" r="2.6" fill="#74DF7B" opacity="0.78"/>
      <circle cx="42" cy="52" r="2.6" fill="#74DF7B" opacity="0.52"/>
    </g>
    <text x="112" y="92" class="status">正在生成回答...</text>
    <text x="112" y="122" class="hint">回答阶段只保留下方三点流动，避免整块区域过于活跃。</text>
  </g>

  <g transform="translate(156 732)">
    <text x="0" y="0" class="label">STATE D</text>
    <rect x="0" y="26" rx="24" ry="24" width="1128" height="128" fill="#171A22" stroke="rgba(72,209,125,0.20)"/>
    <rect x="1" y="27" rx="23" ry="23" width="1126" height="126" fill="rgba(72,209,125,0.03)"/>
    <g transform="translate(34 53)">
      <circle cx="30" cy="30" r="26" fill="#22C55E" opacity="0.12" filter="url(#shadow)"/>
      <rect x="10" y="14" width="40" height="30" rx="14" fill="#1E2A22" stroke="#39C76D" stroke-width="1.8"/>
      <path d="M21 30L27 35L40 22" stroke="#EBFFF0" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M30 14V8" stroke="#39C76D" stroke-width="2" stroke-linecap="round"/>
      <circle cx="30" cy="6" r="3" fill="#39C76D"/>
    </g>
    <text x="112" y="92" class="status">工具调用已完成</text>
    <text x="112" y="122" class="hint">完成态建议完全静止，只保留勾选，不再保留任何运动。</text>
  </g>

  <g transform="translate(940 228)">
    <rect x="0" y="0" rx="20" ry="20" width="252" height="184" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)"/>
    <text x="24" y="40" class="label">这版的关键限制</text>
    <text x="24" y="76" class="hint">1. 只做头部或信号点轻动</text>
    <text x="24" y="104" class="hint">2. 不做完整小动物奔跑</text>
    <text x="24" y="132" class="hint">3. 不在每个工具卡片重复出现</text>
    <text x="24" y="160" class="hint">4. 完成态必须彻底静止</text>
  </g>

  <text x="184" y="930" class="note">如果你接受这个方向，真实实现里我会把动画压到很轻，只保留“活着”的感觉，不做卖萌。</text>
</svg>
