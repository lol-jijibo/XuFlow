services:
  postgres:
    image: postgres:16-alpine
    container_name: xuflow-postgres
    environment:
      POSTGRES_USER: xuflow
      POSTGRES_PASSWORD: xuflow
      POSTGRES_DB: xuflow
    ports:
      - "15432:5432"
    volumes:
      - xuflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xuflow -d xuflow"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  xuflow_postgres_data:
